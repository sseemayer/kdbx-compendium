name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-mdbook

      - name: Install mdBook tools
        run: |
          # Install mdbook only if it's not already available on the runner
          if ! command -v mdbook >/dev/null 2>&1; then
            echo "mdbook not found - installing"
            cargo install mdbook --locked
          else
            echo "mdbook already installed - skipping"
          fi

          # Install mdbook-drawio only if its binary isn't present
          if ! command -v mdbook-drawio >/dev/null 2>&1; then
            echo "mdbook-drawio not found - installing from source"
            git clone https://github.com/QBayLogic/mdbook-drawio /tmp/mdbook-drawio
            cargo install --path /tmp/mdbook-drawio
          else
            echo "mdbook-drawio already installed - skipping"
          fi

      - name: Install draw.io
        run: |
          # Ensure Xvfb is present (required for headless drawio usage)
          if ! command -v Xvfb >/dev/null 2>&1; then
            echo "Xvfb not found - installing"
            sudo apt-get update
            sudo apt-get install -y xvfb
          else
            echo "Xvfb already installed - skipping"
          fi

          # Install drawio only if it's not already available
          if ! command -v drawio >/dev/null 2>&1; then
            echo "drawio not found - downloading and installing"
            curl -L -o /tmp/drawio.deb https://github.com/jgraph/drawio-desktop/releases/download/v30.0.4/drawio-amd64-30.0.4.deb
            sudo apt-get install -y /tmp/drawio.deb
          else
            echo "drawio already installed - skipping"
          fi

      - name: Build book
        run: xvfb-run -a mdbook build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
